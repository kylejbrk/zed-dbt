name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Validate and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate version consistency
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME#v}"

          EXT_VERSION=$(grep -E '^version\s*=' extension.toml | head -n1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          CARGO_VERSION=$(grep -E '^version\s*=' Cargo.toml | head -n1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/')

          echo "Tag version:    $TAG"
          echo "Extension.toml: $EXT_VERSION"
          echo "Cargo.toml:     $CARGO_VERSION"

          test "$EXT_VERSION" = "$CARGO_VERSION"
          test "$TAG" = "$EXT_VERSION"

      - name: Build
        run: cargo build --release --locked

      - name: Run tests
        run: cargo test --locked --all-targets
        # If you don't have tests yet, you can remove this step.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
